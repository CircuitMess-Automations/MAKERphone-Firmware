name: Build MAKERphone Firmware

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-and-flash-local:
    runs-on: [self-hosted, bit-flash]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure arduino-cli is available
        run: |
          if ! command -v arduino-cli &> /dev/null; then
            echo "Installing arduino-cli..."
            brew install arduino-cli || curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s -- --dest /usr/local/bin
          fi
          arduino-cli version

      - name: Install CircuitMess board package
        run: |
          # Add CircuitMess board manager URL if not already present
          arduino-cli config init --overwrite 2>/dev/null || true
          arduino-cli config add board_manager.additional_urls "https://raw.githubusercontent.com/CircuitMess/Arduino-Packages/master/package_circuitmess.com_esp32_index.json" 2>/dev/null || true
          arduino-cli core update-index
          # Self-hosted runner: clear any other cm:esp32 versions so arduino-cli
          # cannot pick a newer one over our pinned 1.7.5 (FQBN has no version qualifier).
          arduino-cli core uninstall cm:esp32 2>/dev/null || true
          arduino-cli core install cm:esp32@1.7.5

      - name: Install required libraries
        run: |
          # cm:esp32@1.7.5 bundles a patched RadioLib (with publicly accessible
          # SX126x/LLCC68 internals) under its libraries/ folder, which is what
          # src/Services/LoRaService.cpp was written against.
          #
          # Self-hosted runner caveat: a user-level RadioLib (from earlier runs
          # or manual installs at ~/Documents/Arduino/libraries/RadioLib) takes
          # priority over the platform-bundled one in the Arduino library
          # resolver. Strip it so the bundled patched copy is the one that wins.
          arduino-cli lib uninstall RadioLib 2>/dev/null || true
          echo "Using bundled RadioLib from cm:esp32@1.7.5 + local libraries/ for Chatter-Library"

      - name: Ensure python shim for ESP32 toolchain
        run: |
          # The cm:esp32 1.7.5 toolchain invokes bare 'python' (e.g.
          # gen_esp32part.py and esptool.py wrappers). macOS removed
          # /usr/bin/python years ago, so we need a python -> python3 shim.
          if ! command -v python >/dev/null 2>&1; then
            mkdir -p "$HOME/bin"
            ln -sf "$(command -v python3)" "$HOME/bin/python"
          fi
          # Persist for subsequent steps in this job.
          echo "$HOME/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/bin:$PATH"
          which python && python --version

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn cm:esp32:chatter \
            --libraries ./libraries \
            --warnings default \
            --output-dir ./build \
            MAKERphone-Firmware.ino

      - name: Flash to device (if connected)
        run: |
          # Prefer /dev/cu.* on macOS - the /dev/tty.* variants block on DCD
          # and can hang esptool. Fall back to /dev/tty.* for completeness.
          PORT=$(ls /dev/cu.usbmodem* /dev/cu.usbserial* /dev/cu.SLAB* \
                    /dev/tty.usbmodem* /dev/tty.usbserial* /dev/tty.SLAB* \
                    2>/dev/null | head -1)
          if [ -n "$PORT" ]; then
            echo "Flashing to $PORT..."
            # No continue-on-error: a real upload failure should turn the
            # build red so we notice instead of silently skipping.
            # Drop the upload baud from the 921600 default to 460800. The
            # CP210x/FT231X bridge on the Chatter loses frames at 921600
            # over many USB cables/hubs ("Invalid head of packet" from
            # esptool); 460800 is reliable in practice and only adds a
            # second or two to the flash.
            arduino-cli upload \
              --fqbn cm:esp32:chatter \
              -p "$PORT" \
              --input-dir ./build \
              --upload-property upload.speed=460800
          else
            echo "No device connected — skipping flash"
          fi
