name: Build MP2.4 Firmware (ESP-IDF)

on:
  push:
    branches: [ master, main ]
    paths:
      - 'mp24/**'
      - 'src/**'
      - 'libraries/Chatter-Library/**'
      - '.github/workflows/build-mp24.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'mp24/**'
      - 'src/**'
      - 'libraries/Chatter-Library/**'
      - '.github/workflows/build-mp24.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, bit-flash]
    defaults:
      run:
        working-directory: mp24
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Locate or install ESP-IDF v5.5
        shell: bash
        run: |
          # The self-hosted Mac runner may already have ESP-IDF cloned
          # (e.g. by a previous run or by hand). Honour an existing
          # source tree at the standard locations, then fall back to a
          # per-runner clone under ~/esp/esp-idf if nothing is found.
          set -euo pipefail

          CANDIDATES=(
            "$HOME/esp/v5.5/esp-idf"
            "$HOME/esp/esp-idf"
            "$HOME/.espressif/esp-idf-v5.5"
            "/opt/esp/esp-idf"
          )

          IDF_PATH_FOUND=""
          for c in "${CANDIDATES[@]}"; do
            if [ -f "$c/export.sh" ]; then
              IDF_PATH_FOUND="$c"
              echo "Using existing ESP-IDF source at $c"
              break
            fi
          done

          if [ -z "$IDF_PATH_FOUND" ]; then
            echo "ESP-IDF source not found — cloning v5.5"
            mkdir -p "$HOME/esp"
            cd "$HOME/esp"
            if [ ! -d esp-idf ]; then
              git clone --depth 1 --branch v5.5 \
                https://github.com/espressif/esp-idf.git esp-idf
              cd esp-idf
              git submodule update --init --recursive --depth 1
            fi
            IDF_PATH_FOUND="$HOME/esp/esp-idf"
          fi

          echo "IDF_PATH=$IDF_PATH_FOUND" >> "$GITHUB_ENV"

      - name: Ensure ESP-IDF tools installed for esp32s3
        shell: bash
        run: |
          # install.sh is idempotent: it only downloads what's missing.
          # On a fresh runner this fetches xtensa-esp-elf, cmake, ninja,
          # openocd, and the Python venv (~250 MB total). On a warm
          # runner it's a no-op. Running it unconditionally avoids the
          # previous failure mode where an existing export.sh existed
          # but the runner had no CMake.
          set -euo pipefail
          cd "$IDF_PATH"
          ./install.sh esp32s3

      - name: Ensure cmake and ninja are on PATH
        shell: bash
        run: |
          # On macOS, ESP-IDF expects CMake + Ninja to come from the
          # system (typically Homebrew) — install.sh does NOT install
          # them. The self-hosted runner has them via Homebrew, but the
          # non-login bash GitHub Actions launches does not source
          # ~/.zprofile, so /opt/homebrew/bin is not on PATH.
          # This step:
          #   1. Adds the standard Homebrew bin dirs to PATH for all
          #      subsequent steps in this job (via $GITHUB_PATH).
          #   2. If cmake or ninja are still missing, installs them
          #      via brew.
          #   3. If brew itself is missing, fails with a clear message
          #      so the runner owner knows what to do.
          set -euo pipefail

          for brew_bin in /opt/homebrew/bin /usr/local/bin; do
            if [ -d "$brew_bin" ]; then
              echo "$brew_bin" >> "$GITHUB_PATH"
              export PATH="$brew_bin:$PATH"
            fi
          done

          need_install=()
          for tool in cmake ninja; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              need_install+=("$tool")
            fi
          done

          if [ "${#need_install[@]}" -gt 0 ]; then
            echo "Missing build tools: ${need_install[*]}"
            if command -v brew >/dev/null 2>&1; then
              echo "Installing via Homebrew (one-time on this runner)..."
              brew install "${need_install[@]}"
            else
              echo "ERROR: cmake/ninja missing and Homebrew unavailable."
              echo "Run on the runner once:"
              echo "  /bin/bash -c \"\$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)\""
              echo "  brew install cmake ninja"
              exit 1
            fi
          fi

          echo "cmake: $(cmake --version | head -1)"
          echo "ninja: $(ninja --version)"

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source "$IDF_PATH/export.sh"
          idf.py --version
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mp24-firmware
          path: |
            mp24/build/makerphone_mp24.bin
            mp24/build/makerphone_mp24.elf
            mp24/build/makerphone_mp24.map
            mp24/build/bootloader/bootloader.bin
            mp24/build/partition_table/partition-table.bin
            mp24/build/flash_args
            mp24/build/spiffs.bin
          if-no-files-found: warn

  # ----------------------------------------------------------------
  # Flash the freshly-built artifact onto a physically-connected
  # MAKERphone v2.4. Runs on the dedicated 'flasher' self-hosted
  # runner — the MacBook that has the device wired to its USB-C.
  #
  # We use esptool directly rather than `idf.py flash` so the flasher
  # machine does NOT need a full ESP-IDF install. Just esptool
  # (`brew install esptool` once on the runner) and Python.
  #
  # PRs from forks would be a security risk (untrusted code → real
  # hardware), so flash is restricted to push events on this repo and
  # to explicit workflow_dispatch runs.
  # ----------------------------------------------------------------
  flash:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, flasher]
    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: mp24-firmware
          path: firmware

      - name: Add Homebrew bin dirs to PATH
        shell: bash
        run: |
          # Same trick as the build job — GitHub Actions launches bash
          # without sourcing ~/.zprofile, so Homebrew isn't on PATH by
          # default on a fresh runner.
          for b in /opt/homebrew/bin /usr/local/bin; do
            if [ -d "$b" ]; then
              echo "$b" >> "$GITHUB_PATH"
              export PATH="$b:$PATH"
            fi
          done

      - name: Ensure esptool is available
        shell: bash
        run: |
          set -euo pipefail
          # esptool v5+ ships the command as `esptool` (the legacy
          # `esptool.py` alias is deprecated and removed in some pkgs).
          # Probe both names so the install check works on older and
          # newer Homebrew formulas.
          if ! command -v esptool >/dev/null 2>&1 && \
             ! command -v esptool.py >/dev/null 2>&1; then
            echo "esptool not found; installing via Homebrew..."
            if command -v brew >/dev/null 2>&1; then
              brew install esptool
            else
              echo "ERROR: esptool missing and Homebrew unavailable."
              echo "On the flasher runner, run once: brew install esptool"
              exit 1
            fi
          fi
          (esptool version 2>/dev/null) || esptool.py version

      - name: Detect MAKERphone serial port
        shell: bash
        run: |
          set -euo pipefail
          # ESP32-S3 enumerates either via USB-Serial-JTAG (boot ROM)
          # or our firmware's USB CDC console; both show up under
          # /dev/cu.usbmodem*. Also accept legacy USB-serial chips
          # just in case a UART adapter is in use.
          PORT=$(ls /dev/cu.usbmodem* /dev/cu.usbserial* /dev/cu.SLAB* \
                   2>/dev/null | head -1 || true)
          if [ -z "$PORT" ]; then
            echo "::error::No MAKERphone serial device found at /dev/cu.usb*."
            echo "Plug the board in via USB-C, then re-run this workflow."
            exit 1
          fi
          echo "Found device: $PORT"
          echo "MP24_PORT=$PORT" >> "$GITHUB_ENV"

      - name: Flash firmware
        shell: bash
        working-directory: firmware
        run: |
          set -euo pipefail
          echo "=== Artifact contents ==="
          ls -la
          echo "=== flash_args ==="
          cat flash_args
          echo "========================"
          # --before usb-reset uses the ESP32-S3's built-in USB-Serial/
          # JTAG controller to force the chip into download mode at the
          # ROM level, regardless of what firmware (if any) is running
          # on the chip. This is the only reliable path on the MAKERphone
          # because SW24 (the BOOT-pin button) is an SMD switch under the
          # case, not user-accessible. Without --before usb-reset, a
          # halted/bricked firmware that owns USB-OTG blocks esptool's
          # default RTS/DTR-based reset sequence.
          #
          # `@flash_args` expands to the ESP-IDF-generated command line
          # (flash mode/freq/size + 3 offset/file pairs). Working
          # directory is the artifact root so the relative paths inside
          # flash_args resolve correctly.
          # esptool can fail with "No serial data received" when
          # the firmware in flash is in a tight crash loop — the
          # chip resets faster than esptool can establish sync.
          # `--before usb-reset` SHOULD recover it, but if the
          # crash happens too early the chip never sits in ROM
          # long enough to respond.
          #
          # Retry up to 8 times with a 3-second pause between
          # attempts; the cumulative resets eventually catch the
          # chip during a longer ROM-mode window. Each attempt
          # is otherwise identical.
          OK=0
          for attempt in 1 2 3 4 5 6 7 8; do
            echo "=== Flash attempt $attempt/8 ==="
            if esptool --chip esp32s3 --port "$MP24_PORT" --baud 460800 \
                 --before usb-reset --after hard-reset \
                 write-flash @flash_args; then
              OK=1
              break
            fi
            echo "Attempt $attempt failed; sleeping 3s before retry..."
            sleep 3
          done
          if [ $OK -ne 1 ]; then
            echo "All 8 flash attempts failed — device is unrecoverable"
            echo "via esptool. Most likely cause: firmware in flash"
            echo "is crashing too early for ROM USB-Serial/JTAG to"
            echo "respond. Physical recovery needed (SW24 BOOT pin)."
            exit 2
          fi
          echo ""
          echo "✓ Flash complete. The MAKERphone should now be running"
          echo "  the new firmware. Open USB-CDC serial to view logs."

      - name: Capture boot serial log
        shell: bash
        working-directory: firmware
        # Capture 20s of USB-Serial/JTAG console output starting
        # immediately after the chip resets out of esptool. If the
        # firmware crash-loops, the panic handler dumps backtrace +
        # register state before each reset — those frames give us
        # the PC to feed into addr2line for a function-name trace.
        #
        # The Mac may re-enumerate the device file when the chip
        # resets, so wait ~1s for /dev/cu.usbmodem2101 to come
        # back online before reading. timeout caps the read at
        # 20s either way. The python one-liner sets the port to
        # 115200 baud (matches CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG
        # default) and tees output through to both the job log
        # AND the captured file.
        run: |
          set -uo pipefail
          sleep 2
          echo "=== Capturing 20s from $MP24_PORT @ 115200 ==="
          # macOS doesn't have GNU `timeout` by default — python's
          # own time-bound loop handles the 20s cap.
          python3 - <<'PYEOF' > boot.log 2>&1 || true
          import sys, time
          try:
              import serial
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--quiet', 'pyserial'])
              import serial
          import os
          port = os.environ.get('MP24_PORT', '/dev/cu.usbmodem2101')
          end = time.time() + 19
          while time.time() < end:
              try:
                  with serial.Serial(port, 115200, timeout=1) as s:
                      while time.time() < end:
                          chunk = s.read(256)
                          if chunk:
                              sys.stdout.write(chunk.decode('utf-8', errors='replace'))
                              sys.stdout.flush()
              except (serial.SerialException, OSError) as e:
                  # Device went away — wait briefly and reconnect.
                  print(f"\n[reconnect: {e}]", flush=True)
                  time.sleep(0.5)
          PYEOF
          echo "=== boot.log (first 200 lines) ==="
          head -200 boot.log
          echo "=== ... ==="
          echo "=== boot.log (last 100 lines) ==="
          tail -100 boot.log

      - name: Detect crash in boot log
        shell: bash
        working-directory: firmware
        # Fail the job loudly if boot.log contains panic markers,
        # so the workflow's success/failure status directly tracks
        # device boot health. The boot-log + firmware artifacts
        # are already uploaded by earlier steps (or via the
        # `if: always()` on Upload boot log) so the diagnosis
        # artifacts are available either way.
        #
        # Markers we treat as crashes:
        #   "Guru Meditation"  — hardware exception (LoadProhibited, etc.)
        #   "panic'ed"         — explicit panic call
        #   "abort() was called" — assert / abort
        #   "rst:0x" multiple times — multiple reboots within 20s
        #     (indicates crash loop even if panic text was truncated)
        #
        # Healthy boot still produces some "rst:0x..." at the start
        # (initial cold reset) so we tolerate one but flag 2+.
        run: |
          set -uo pipefail
          if [[ ! -s boot.log ]]; then
            echo "::warning::boot.log is empty — capture step likely failed."
            echo "Continuing without crash detection."
            exit 0
          fi
          panics=$(grep -cE "Guru Meditation|panic'ed|abort\\(\\) was called" boot.log || true)
          resets=$(grep -cE "^rst:0x" boot.log || true)
          backtraces=$(grep -cE "^Backtrace:" boot.log || true)
          echo "=== Boot health summary ==="
          echo "  Guru/panic/abort markers : $panics"
          echo "  Reset count (rst:0x...)  : $resets"
          echo "  Backtrace frames         : $backtraces"
          if [[ "$panics" -gt 0 ]] || [[ "$resets" -gt 1 ]] || [[ "$backtraces" -gt 0 ]]; then
            echo "::error::Device crashed on boot (panics=$panics resets=$resets backtraces=$backtraces)"
            echo "First panic dump:"
            awk '/Guru Meditation|panic.ed/,/Rebooting/' boot.log | head -30
            exit 3
          fi
          # Also require that some MP24 module heartbeats appear —
          # otherwise the boot probably hung silently before logging.
          if ! grep -qE "MP24|STORE|MODEM|LVGL|POWER" boot.log; then
            echo "::warning::No MP24 module heartbeats in boot.log."
            echo "Device may have hung silently or capture missed window."
            # Don't fail — capture race conditions cause this too.
          fi
          echo "✓ Device booted cleanly."

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: firmware/boot.log
          if-no-files-found: ignore
