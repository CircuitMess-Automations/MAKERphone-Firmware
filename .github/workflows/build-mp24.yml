name: Build MP2.4 Firmware (ESP-IDF)

on:
  push:
    branches: [ master, main ]
    paths:
      - 'mp24/**'
      - '.github/workflows/build-mp24.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'mp24/**'
      - '.github/workflows/build-mp24.yml'
  workflow_dispatch:

jobs:
  build-mp24:
    runs-on: [self-hosted, bit-flash]
    defaults:
      run:
        working-directory: mp24
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Locate or install ESP-IDF v5.5
        shell: bash
        run: |
          # The self-hosted Mac runner may already have ESP-IDF cloned
          # (e.g. by a previous run or by hand). Honour an existing
          # source tree at the standard locations, then fall back to a
          # per-runner clone under ~/esp/esp-idf if nothing is found.
          set -euo pipefail

          CANDIDATES=(
            "$HOME/esp/v5.5/esp-idf"
            "$HOME/esp/esp-idf"
            "$HOME/.espressif/esp-idf-v5.5"
            "/opt/esp/esp-idf"
          )

          IDF_PATH_FOUND=""
          for c in "${CANDIDATES[@]}"; do
            if [ -f "$c/export.sh" ]; then
              IDF_PATH_FOUND="$c"
              echo "Using existing ESP-IDF source at $c"
              break
            fi
          done

          if [ -z "$IDF_PATH_FOUND" ]; then
            echo "ESP-IDF source not found — cloning v5.5"
            mkdir -p "$HOME/esp"
            cd "$HOME/esp"
            if [ ! -d esp-idf ]; then
              git clone --depth 1 --branch v5.5 \
                https://github.com/espressif/esp-idf.git esp-idf
              cd esp-idf
              git submodule update --init --recursive --depth 1
            fi
            IDF_PATH_FOUND="$HOME/esp/esp-idf"
          fi

          echo "IDF_PATH=$IDF_PATH_FOUND" >> "$GITHUB_ENV"

      - name: Ensure ESP-IDF tools installed for esp32s3
        shell: bash
        run: |
          # install.sh is idempotent: it only downloads what's missing.
          # On a fresh runner this fetches xtensa-esp-elf, cmake, ninja,
          # openocd, and the Python venv (~250 MB total). On a warm
          # runner it's a no-op. Running it unconditionally avoids the
          # previous failure mode where an existing export.sh existed
          # but the runner had no CMake.
          set -euo pipefail
          cd "$IDF_PATH"
          ./install.sh esp32s3

      - name: Ensure cmake and ninja are on PATH
        shell: bash
        run: |
          # On macOS, ESP-IDF expects CMake + Ninja to come from the
          # system (typically Homebrew) — install.sh does NOT install
          # them. The self-hosted runner has them via Homebrew, but the
          # non-login bash GitHub Actions launches does not source
          # ~/.zprofile, so /opt/homebrew/bin is not on PATH.
          # This step:
          #   1. Adds the standard Homebrew bin dirs to PATH for all
          #      subsequent steps in this job (via $GITHUB_PATH).
          #   2. If cmake or ninja are still missing, installs them
          #      via brew.
          #   3. If brew itself is missing, fails with a clear message
          #      so the runner owner knows what to do.
          set -euo pipefail

          for brew_bin in /opt/homebrew/bin /usr/local/bin; do
            if [ -d "$brew_bin" ]; then
              echo "$brew_bin" >> "$GITHUB_PATH"
              export PATH="$brew_bin:$PATH"
            fi
          done

          need_install=()
          for tool in cmake ninja; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              need_install+=("$tool")
            fi
          done

          if [ "${#need_install[@]}" -gt 0 ]; then
            echo "Missing build tools: ${need_install[*]}"
            if command -v brew >/dev/null 2>&1; then
              echo "Installing via Homebrew (one-time on this runner)..."
              brew install "${need_install[@]}"
            else
              echo "ERROR: cmake/ninja missing and Homebrew unavailable."
              echo "Run on the runner once:"
              echo "  /bin/bash -c \"\$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)\""
              echo "  brew install cmake ninja"
              exit 1
            fi
          fi

          echo "cmake: $(cmake --version | head -1)"
          echo "ninja: $(ninja --version)"

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source "$IDF_PATH/export.sh"
          idf.py --version
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mp24-firmware
          path: |
            mp24/build/makerphone_mp24.bin
            mp24/build/bootloader/bootloader.bin
            mp24/build/partition_table/partition-table.bin
            mp24/build/flash_args
          if-no-files-found: warn

      - name: Flash to device (if connected)
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source "$IDF_PATH/export.sh"
          PORT=$(ls /dev/cu.usbmodem* /dev/cu.usbserial* /dev/cu.SLAB* \
                    2>/dev/null | head -1 || true)
          if [ -n "$PORT" ]; then
            echo "Flashing to $PORT"
            idf.py -p "$PORT" -b 460800 flash
          else
            echo "No device connected — skipping flash"
          fi
