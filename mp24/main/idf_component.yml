## mp24/main component dependencies
##
## arduino-esp32 v3.3.x is the line compatible with ESP-IDF v5.5 (our IDF).
## The component pulls in the Arduino core APIs (Arduino.h, Serial, SPI,
## SPIFFS, etc.) that the existing CircuitOS / Chatter-Library / phone
## firmware was written against.
##
## CONFIG_AUTOSTART_ARDUINO is left UNSET in our sdkconfig so the
## arduino-esp32 component does NOT take over app_main. We keep control
## of the entry point and call initArduino() ourselves before bootstrapping
## the Chatter app code.
##
## Component sizes to be aware of:
##   - arduino-esp32 base: ~600 KB compiled
##   - WiFi/BLE/OTA libraries pulled by default: ~400 KB more
## We can strip these via CONFIG_ARDUINO_SELECTIVE_* knobs once the
## footprint becomes a problem. For S-MP13a (the foundation) we leave
## the defaults so we can see what actually breaks first.

dependencies:
  idf:
    version: ">=5.5,<5.6"

  espressif/arduino-esp32:
    version: "^3.3.8"

  # S-MP16: LVGL 9.x for the phone UI. The legacy phone firmware
  # was written against LVGL (lock screen, MainMenu, dialer,
  # messages, contacts — all LVGL widgets). We use the latest 9.x
  # so we get the modern `lv_display_create` + `lv_indev_create`
  # APIs and current widget set. The Espressif esp_lvgl_port helper
  # is intentionally NOT included — it's wired to esp_lcd-based
  # panels, while our hal/display uses the older SPI driver
  # directly. We write a small lv_port_disp.c instead.
  lvgl/lvgl:
    version: "^9.5"
